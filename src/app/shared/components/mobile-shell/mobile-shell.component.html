<div class="shell">
  <div class="shell__phone">
    <app-status-bar />
    <div class="shell__content">
      <router-outlet />
    </div>
    <app-bottom-nav />

    <!-- Drawer al nivel del phone — cubre status bar + bottom nav -->
    <app-filter-drawer
      [isOpen]="filterState.isOpen()"
      (close)="filterState.close()"
      (apply)="filterState.apply($event)"
    />
  </div>
</div>
