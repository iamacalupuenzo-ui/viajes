<div class="shell">
  <div class="shell__phone" [class.shell__phone--fullscreen]="isFullscreen()">
    <app-status-bar />
    <div class="shell__content" [class.shell__content--clip]="isFullscreen()">
      <router-outlet />
    </div>

    @if (!isFullscreen()) {
      <app-bottom-nav />
      <app-filter-drawer
        [isOpen]="filterState.isOpen()"
        (close)="filterState.close()"
        (apply)="filterState.apply($event)"
      />
    }

    <app-test-hud />
  </div>
</div>
