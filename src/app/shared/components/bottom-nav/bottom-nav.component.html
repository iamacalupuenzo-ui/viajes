<nav class="bottom-nav">
  @for (item of items; track item.route) {
    <a
      class="bottom-nav__item"
      [routerLink]="item.route"
      routerLinkActive="bottom-nav__item--active"
    >
      <span class="bottom-nav__pill"></span>
      <span class="bottom-nav__icon">
        @switch (item.icon) {
          @case ('home') {
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M4 12L12 4L20 12V20H16V15C16 14.4477 15.5523 14 15 14H9C8.44772 14 8 14.4477 8 15V20H4V12Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
            </svg>
          }
          @case ('chart') {
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M4 20H20" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <rect x="4" y="13" width="3.5" height="7" rx="1" fill="currentColor" opacity="0.5"/>
              <rect x="10.25" y="8" width="3.5" height="12" rx="1" fill="currentColor" opacity="0.7"/>
              <rect x="16.5" y="4" width="3.5" height="16" rx="1" fill="currentColor"/>
            </svg>
          }
          @case ('car') {
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <path d="M5 17H3V11L6.5 6H17.5L21 11V17H19M5 17C5 18.1046 5.89543 19 7 19C8.10457 19 9 18.1046 9 17M5 17C5 15.8954 5.89543 15 7 15C8.10457 15 9 15.8954 9 17M19 17C19 18.1046 18.1046 19 17 19C15.8954 19 15 18.1046 15 17M19 17C19 15.8954 18.1046 15 17 15C15.8954 15 15 15.8954 15 17M9 17H15M3 13H21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          }
          @case ('person') {
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="1.8"/>
              <path d="M4 21C4 17.134 7.58172 14 12 14C16.4183 14 20 17.134 20 21" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          }
        }
      </span>
      <span class="bottom-nav__label">{{ item.label }}</span>
    </a>
  }
</nav>
