<div class="status-bar">
  <span class="status-bar__time">{{ time }}</span>
  <div class="status-bar__icons">
    <!-- Signal bars -->
    <svg width="17" height="12" viewBox="0 0 17 12" fill="currentColor">
      <rect x="0" y="7" width="3" height="5" rx="1"/>
      <rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/>
      <rect x="9" y="2" width="3" height="10" rx="1"/>
      <rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.3"/>
    </svg>
    <!-- Wifi -->
    <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
      <path d="M8 9.5C8.83 9.5 9.5 10.17 9.5 11C9.5 11.83 8.83 12.5 8 12.5C7.17 12.5 6.5 11.83 6.5 11C6.5 10.17 7.17 9.5 8 9.5Z" fill="currentColor"/>
      <path d="M3.5 6.5C5.43 4.57 9.57 4.57 11.5 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M1 4C4.31 0.69 11.69 0.69 15 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    </svg>
    <!-- Battery -->
    <div class="status-bar__battery">
      <div class="status-bar__battery-body">
        <div class="status-bar__battery-fill"></div>
      </div>
      <div class="status-bar__battery-tip"></div>
    </div>
  </div>
</div>
